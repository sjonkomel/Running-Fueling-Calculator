<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fueling Needs Calculator for Running</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3 {
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fc;
            border-radius: 4px;
            display: none;
        }
        .timeline-container {
            margin: 30px 0;
            position: relative;
            height: 80px;
        }
        .timeline-bar {
            height: 10px;
            background-color: #3498db;
            border-radius: 5px;
            position: relative;
            margin: 20px 0;
        }
        .timeline-segment {
            position: absolute;
            height: 10px;
            border-left: 1px solid #2980b9;
            top: 0;
        }
        .timeline-label {
            position: absolute;
            top: 15px;
            font-size: 12px;
            color: #555;
        }
        .intake-icon {
            position: absolute;
            top: -20px;
            width: 40px;
            height: 40px;
            background-color: #e74c3c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
        .intake-icon:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 14px;
            z-index: 10;
        }
        .pre-post-section {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }
        .pre-post-box {
            padding: 10px;
            background-color: #f1c40f;
            border-radius: 4px;
            width: 48%;
            text-align: center;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        @media print {
            .no-print {
                display: none;
            }
            .timeline-container, .pre-post-section {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fueling Needs Calculator for Running</h1>

        <div class="form-group">
            <label for="training-type">Training Type:</label>
            <select id="training-type" onchange="updateHeartRateZone()">
                <option value="easy">Easy Run</option>
                <option value="moderate">Moderate Run</option>
                <option value="hard">Hard Workout</option>
                <option value="race">Race</option>
            </select>
        </div>

        <div class="form-group">
            <label for="duration">Duration (hours):</label>
            <input type="number" id="duration" min="0.5" max="6" step="0.1" value="1">
        </div>

        <div class="form-group">
            <label for="body-weight">Body Weight (kg):</label>
            <input type="number" id="body-weight" min="40" max="150" value="70">
        </div>

        <div class="form-group">
            <label for="temperature">Temperature (°C):</label>
            <input type="number" id="temperature" min="-10" max="50" value="20">
        </div>

        <div class="form-group">
            <label for="max-heart-rate">Max Heart Rate (bpm):</label>
            <input type="number" id="max-heart-rate" min="40" max="220" value="180" onchange="updateHeartRateZone()">
        </div>

        <div class="form-group">
            <label for="heart-rate">Current Heart Rate (bpm):</label>
            <input type="number" id="heart-rate" min="40" max="220" value="120">
        </div>

        <div class="form-group">
            <label>Heart Rate Zones (as % of Max HR):</label>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 1: <input type="number" id="zone1-min" value="0" min="0" max="100" disabled>% - <input type="number" id="zone1-max" value="65" min="0" max="100" disabled>%</label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 2: <input type="number" id="zone2-min" value="66" min="0" max="100" disabled>% - <input type="number" id="zone2-max" value="75" min="0" max="100" disabled>%</label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 3: <input type="number" id="zone3-min" value="76" min="0" max="100" disabled>% - <input type="number" id="zone3-max" value="84" min="0" max="100" disabled>%</label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 4: <input type="number" id="zone4-min" value="85" min="0" max="100" disabled>% - <input type="number" id="zone4-max" value="98" min="0" max="100" disabled>%</label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 5: <input type="number" id="zone5-min" value="99" min="0" max="100" disabled>% - <input type="number" id="zone5-max" value="100" min="0" max="100" disabled>%</label>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>Select Fuel Type:</label>
            <div>
                <label><input type="checkbox" id="brand-gels" checked> Brand Gels (e.g., GU, Maurten)</label>
            </div>
            <div>
                <label><input type="checkbox" id="brand-drinks" checked> Brand Drinks (e.g., Gatorade, Tailwind)</label>
            </div>
            <div>
                <label><input type="checkbox" id="custom-fuel"> Custom Fuel</label>
            </div>
        </div>

        <div id="custom-fuel-section" class="form-group" style="display: none;">
            <label for="custom-name">Custom Fuel Name:</label>
            <input type="text" id="custom-name" placeholder="e.g., Homemade Energy Drink">
            <label for="custom-carbs">Carbs per Serving (g):</label>
            <input type="number" id="custom-carbs" min="0" value="25">
            <label for="custom-serving-size">Serving Size (ml):</label>
            <input type="number" id="custom-serving-size" min="0" value="250">
        </div>

        <button onclick="calculateFueling()">Calculate Fueling Needs</button>

        <div id="results" class="results">
            <h2>Your Fueling Plan</h2>

            <div class="pre-post-section">
                <div class="pre-post-box">
                    <strong>Pre-Start (-1 hour)</strong><br>
                    <span id="pre-start-details"></span>
                </div>
                <div class="pre-post-box">
                    <strong>Post-Finish (+30 mins)</strong><br>
                    <span id="post-finish-details"></span>
                </div>
            </div>

            <h3>During Activity</h3>
            <div class="timeline-container">
                <div class="timeline-bar" id="timeline-bar"></div>
            </div>

            <h3>Detailed Plan</h3>
            <div class="no-print">
                <button onclick="window.print()">Print to PDF</button>
            </div>
            <table id="fueling-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Suggestion</th>
                        <th>Carbs (g)</th>
                        <th>Fluids (ml)</th>
                        <th>Sodium (mg)</th>
                    </tr>
                </thead>
                <tbody id="fueling-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Toggle custom fuel section
        document.getElementById('custom-fuel').addEventListener('change', function() {
            document.getElementById('custom-fuel-section').style.display = this.checked ? 'block' : 'none';
        });

        // Update heart rate and zone based on training type
        function updateHeartRateZone() {
            const trainingType = document.getElementById('training-type').value;
            const maxHeartRate = parseInt(document.getElementById('max-heart-rate').value) || 180;

            let zoneMin, zoneMax, zoneName;
            switch (trainingType) {
                case "easy":
                    zoneMin = 66;
                    zoneMax = 75;
                    zoneName = "Zone 2 (Moderate)";
                    break;
                case "moderate":
                    zoneMin = 76;
                    zoneMax = 84;
                    zoneName = "Zone 3 (Hard)";
                    break;
                case "hard":
                    zoneMin = 85;
                    zoneMax = 98;
                    zoneName = "Zone 4 (Very Hard)";
                    break;
                case "race":
                    zoneMin = 76;
                    zoneMax = 98;
                    zoneName = "Zone 3/4 (Hard/Very Hard)";
                    break;
                default:
                    zoneMin = 66;
                    zoneMax = 75;
                    zoneName = "Zone 2 (Moderate)";
            }

            // Set current heart rate to midpoint of the zone
            const midpointPercentage = (zoneMin + zoneMax) / 2;
            const currentHeartRate = Math.round((midpointPercentage / 100) * maxHeartRate);
            document.getElementById('heart-rate').value = currentHeartRate;
        }

        // Product database
        const productDatabase = [
            { name: "GU Energy Gel", carbs: 25, fluids: 0, sodium: 100, servingSize: "32g", type: "gel" },
            { name: "Maurten Gel 100", carbs: 25, fluids: 0, sodium: 50, servingSize: "40g", type: "gel" },
            { name: "Tailwind Nutrition Drink", carbs: 25, fluids: 250, sodium: 200, servingSize: "250ml", type: "drink" },
            { name: "Gatorade Endurance", carbs: 36, fluids: 500, sodium: 300, servingSize: "500ml", type: "drink" },
            { name: "Water", carbs: 0, fluids: 250, sodium: 0, servingSize: "250ml", type: "drink" }
        ];

        // Calculate fueling needs
        function calculateFueling() {
            // Get inputs
            const trainingType = document.getElementById('training-type').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const bodyWeight = parseFloat(document.getElementById('body-weight').value);
            const temperature = parseFloat(document.getElementById('temperature').value);
            const heartRate = parseInt(document.getElementById('heart-rate').value);
            const maxHeartRate = parseInt(document.getElementById('max-heart-rate').value);

            // Heart rate zones (default values)
            const zone1Min = 0;
            const zone1Max = 65;
            const zone2Min = 66;
            const zone2Max = 75;
            const zone3Min = 76;
            const zone3Max = 84;
            const zone4Min = 85;
            const zone4Max = 98;
            const zone5Min = 99;
            const zone5Max = 100;

            // Determine heart rate zone
            const hrPercentage = (heartRate / maxHeartRate) * 100;
            let hrZone;
            if (hrPercentage <= zone1Max) hrZone = "Zone 1 (Easy)";
            else if (hrPercentage <= zone2Max) hrZone = "Zone 2 (Moderate)";
            else if (hrPercentage <= zone3Max) hrZone = "Zone 3 (Hard)";
            else if (hrPercentage <= zone4Max) hrZone = "Zone 4 (Very Hard)";
            else hrZone = "Zone 5 (Max Effort)";

            // Carb requirements based on training type and zone
            let carbsPerHour;
            switch (trainingType) {
                case "easy":
                    carbsPerHour = hrZone.includes("Zone 2") ? 40 : 30;
                    break;
                case "moderate":
                    carbsPerHour = hrZone.includes("Zone 3") ? 50 : 40;
                    break;
                case "hard":
                    carbsPerHour = hrZone.includes("Zone 4") ? 70 : 60;
                    break;
                case "race":
                    carbsPerHour = hrZone.includes("Zone 4") ? 80 : hrZone.includes("Zone 3") ? 70 : 60;
                    break;
                default:
                    carbsPerHour = 50;
            }

            // Fluid and sodium adjustments based on temperature and body weight
            const baseFluidPerHour = 500;
            const baseSodiumPerHour = 500;
            const tempFluidAdjustment = temperature > 25 ? 100 : 0;
            const tempSodiumAdjustment = temperature > 30 ? 200 : 0;
            const weightFluidAdjustment = bodyWeight * 5; // 5ml/kg/hour

            const fluidPerHour = baseFluidPerHour + tempFluidAdjustment + weightFluidAdjustment;
            const sodiumPerHour = baseSodiumPerHour + tempSodiumAdjustment;

            // Pre-start recommendations
            const preStartCarbs = Math.round(bodyWeight * 1.5); // 1-2g/kg, using 1.5g/kg as middle
            const preStartFluids = 500;
            const preStartSodium = 300;
            const preStartSuggestion = "Oatmeal + Banana";

            // Post-finish recommendations
            const postFinishCarbs = Math.round(bodyWeight * 1.1); // 1-1.2g/kg
            const postFinishFluids = Math.round(fluidPerHour * duration * 1.5); // 1.5x fluid lost
            const postFinishSodium = 600;
            const postFinishSuggestion = "Recovery Shake + Water";

            // Fuel selection
            const brandGels = document.getElementById('brand-gels').checked;
            const brandDrinks = document.getElementById('brand-drinks').checked;
            const customFuel = document.getElementById('custom-fuel').checked;

            let recommendedProducts = [];
            if (brandGels) recommendedProducts.push(...productDatabase.filter(p => p.type === "gel"));
            if (brandDrinks) recommendedProducts.push(...productDatabase.filter(p => p.type === "drink"));
            if (customFuel) {
                const customName = document.getElementById('custom-name').value || "Custom Fuel";
                const customCarbs = parseInt(document.getElementById('custom-carbs').value) || 25;
                const customFluids = parseInt(document.getElementById('custom-serving-size').value) || 0;
                recommendedProducts.push({ name: customName, carbs: customCarbs, fluids: customFluids, sodium: 0, servingSize: `${customFluids}ml`, type: "custom" });
            }

            // Fueling schedule during activity
            const schedule = [];
            const interval = duration <= 1 ? 30 : 45; // minutes
            const totalMinutes = duration * 60;

            // Add pre-start to schedule
            schedule.push({
                time: "-1:00",
                suggestion: preStartSuggestion,
                carbs: preStartCarbs,
                fluids: preStartFluids,
                sodium: preStartSodium,
                isPrePost: true
            });

            // Add during activity intakes
            for (let i = interval; i <= totalMinutes; i += interval) {
                const timeInHours = i / 60;
                const carbs = Math.round(carbsPerHour * timeInHours);
                const fluids = Math.round(fluidPerHour * timeInHours);
                const sodium = Math.round(sodiumPerHour * timeInHours);

                // Select a random product for variety
                const productIndex = Math.floor(Math.random() * recommendedProducts.length);
                const product = recommendedProducts[productIndex];

                schedule.push({
                    time: formatTime(i),
                    suggestion: product.name,
                    carbs: product.carbs,
                    fluids: product.fluids,
                    sodium: product.sodium,
                    isPrePost: false
                });
            }

            // Add post-finish to schedule
            schedule.push({
                time: `Finish + 0:30`,
                suggestion: postFinishSuggestion,
                carbs: postFinishCarbs,
                fluids: postFinishFluids,
                sodium: postFinishSodium,
                isPrePost: true
            });

            // Display pre-start and post-finish
            document.getElementById('pre-start-details').innerHTML =
                `${preStartSuggestion}<br>Carbs: ${preStartCarbs}g, Fluids: ${preStartFluids}ml, Sodium: ${preStartSodium}mg`;
            document.getElementById('post-finish-details').innerHTML =
                `${postFinishSuggestion}<br>Carbs: ${postFinishCarbs}g, Fluids: ${postFinishFluids}ml, Sodium: ${postFinishSodium}mg`;

            // Create timeline
            createTimeline(schedule.filter(item => !item.isPrePost), duration);

            // Create table
            createTable(schedule);

            // Show results
            document.getElementById('results').style.display = 'block';
        }

        // Format time from minutes to HH:MM
        function formatTime(minutes) {
            const hrs = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hrs}:${mins.toString().padStart(2, '0')}`;
        }

        // Create visual timeline
        function createTimeline(schedule, duration) {
            const timelineBar = document.getElementById('timeline-bar');
            timelineBar.innerHTML = '';

            const totalMinutes = duration * 60;
            const barWidth = timelineBar.offsetWidth;

            // Add segments (e.g., every 30 or 45 minutes)
            const segmentInterval = duration <= 1 ? 30 : 45;
            for (let i = segmentInterval; i <= totalMinutes; i += segmentInterval) {
                const segment = document.createElement('div');
                segment.className = 'timeline-segment';
                segment.style.left = `${(i / totalMinutes) * 100}%`;
                timelineBar.appendChild(segment);

                const label = document.createElement('div');
                label.className = 'timeline-label';
                label.textContent = formatTime(i);
                label.style.left = `${(i / totalMinutes) * 100}%`;
                timelineBar.parentNode.appendChild(label);
            }

            // Add intake icons
            schedule.forEach(item => {
                const [hrs, mins] = item.time.split(':').map(Number);
                const totalItemMinutes = hrs * 60 + mins;
                const positionPercentage = (totalItemMinutes / totalMinutes) * 100;

                const icon = document.createElement('div');
                icon.className = 'intake-icon';
                icon.style.left = `${positionPercentage}%`;

                // Choose icon based on suggestion
                let iconHtml, tooltip;
                const product = productDatabase.find(p => p.name === item.suggestion) || { type: "custom" };
                if (product.type === "gel" || item.suggestion.includes("Gel")) {
                    iconHtml = '<i class="fas fa-capsules"></i>';
                } else if (product.type === "drink" || item.suggestion.includes("Drink") || item.suggestion.includes("Water")) {
                    iconHtml = '<i class="fas fa-tint"></i>';
                } else {
                    iconHtml = '<i class="fas fa-utensils"></i>';
                }

                tooltip = `${item.time}: ${item.suggestion}\nCarbs: ${item.carbs}g, Fluids: ${item.fluids}ml, Sodium: ${item.sodium}mg`;
                icon.innerHTML = iconHtml;
                icon.setAttribute('data-tooltip', tooltip);

                timelineBar.parentNode.appendChild(icon);
            });
        }

        // Create detailed table
        function createTable(schedule) {
            const tableBody = document.getElementById('fueling-table-body');
            tableBody.innerHTML = '';

            schedule.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.time}</td>
                    <td>${item.suggestion}</td>
                    <td>${item.carbs}</td>
                    <td>${item.fluids}</td>
                    <td>${item.sodium}</td>
                `;
                tableBody.appendChild(row);
            });
        }

        // Initialize heart rate zone on page load
        window.onload = updateHeartRateZone;
    </script>
</body>
</html>
