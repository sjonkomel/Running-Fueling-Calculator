<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fueling Needs Calculator for Running</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1, h2, h3 {
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .inline-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .inline-group input {
            width: auto;
            flex: 1;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .warning {
            color: #e74c3c;
            font-weight: bold;
            margin-top: 5px;
        }
        .results {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4fc;
            border-radius: 4px;
            display: none;
        }
        .timeline-container {
            margin: 30px 0;
            position: relative;
            height: 80px;
        }
        .timeline-bar {
            height: 10px;
            background-color: #3498db;
            border-radius: 5px;
            position: relative;
            margin: 20px 0;
        }
        .timeline-segment {
            position: absolute;
            height: 10px;
            border-left: 1px solid #2980b9;
            top: 0;
        }
        .timeline-label {
            position: absolute;
            top: 15px;
            font-size: 12px;
            color: #555;
        }
        .intake-icon {
            position: absolute;
            top: -20px;
            width: 40px;
            height: 40px;
            background-color: #e74c3c;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.3);
        }
        .intake-icon:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #333;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            white-space: nowrap;
            font-size: 14px;
            z-index: 10;
        }
        .pre-post-section {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
            flex-wrap: wrap;
            gap: 10px;
        }
        .pre-post-box {
            padding: 10px;
            background-color: #f1c40f;
            border-radius: 4px;
            width: 48%;
            text-align: center;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        tr.total-row {
            background-color: #e8f4fc !important;
            font-weight: bold;
        }
        .profile-section {
            margin-bottom: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        @media print {
            .no-print {
                display: none;
            }
            .timeline-container, .pre-post-section {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Fueling Needs Calculator for Running</h1>

        <div class="profile-section">
            <h3>User Profile</h3>
            <div class="form-group">
                <label for="body-weight">Body Weight (kg):</label>
                <input type="number" id="body-weight" min="40" max="150" value="70">
            </div>
            <div class="form-group">
                <label for="max-heart-rate">Max Heart Rate (bpm):</label>
                <input type="number" id="max-heart-rate" min="40" max="220" value="180" onchange="updateHeartRateZone()">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="heavy-sweater"> I am a heavy sweater (adds +200mg sodium/hour)
                </label>
            </div>
            <button onclick="saveProfile()">Save Profile</button>
            <button onclick="loadProfile()">Load Profile</button>
        </div>

        <div class="form-group">
            <label for="training-type">Training Type:</label>
            <select id="training-type" onchange="updateHeartRateZone()">
                <option value="easy">Easy Run</option>
                <option value="moderate">Moderate Run</option>
                <option value="hard">Hard Workout</option>
                <option value="race">Race</option>
            </select>
        </div>

        <div class="form-group">
            <label for="duration">Duration (hours):</label>
            <input type="number" id="duration" min="0.5" max="6" step="0.1" value="1">
        </div>

        <div class="form-group">
            <label for="temperature">Temperature (°C):</label>
            <input type="number" id="temperature" min="-10" max="50" value="20">
        </div>

        <div class="form-group">
            <label for="pace-zone">Pace Zone (optional, e.g., 5:30-6:00/km):</label>
            <input type="text" id="pace-zone" placeholder="e.g., 5:30-6:00/km">
        </div>

        <div class="form-group">
            <label for="intended-heart-rate">Intended Training/Race Heart Rate (bpm):</label>
            <input type="number" id="intended-heart-rate" min="40" max="220" value="120">
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox" id="use-bpm" onchange="toggleHeartRateMode()"> Use BPM instead of % for zones
            </label>
        </div>

        <div class="form-group">
            <label>Heart Rate Zones:</label>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 1: <input type="number" id="zone1-min" value="0" min="0" max="100" class="zone-input"> - <input type="number" id="zone1-max" value="65" min="0" max="100" class="zone-input"></label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 2: <input type="number" id="zone2-min" value="66" min="0" max="100" class="zone-input"> - <input type="number" id="zone2-max" value="75" min="0" max="100" class="zone-input"></label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 3: <input type="number" id="zone3-min" value="76" min="0" max="100" class="zone-input"> - <input type="number" id="zone3-max" value="84" min="0" max="100" class="zone-input"></label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 4: <input type="number" id="zone4-min" value="85" min="0" max="100" class="zone-input"> - <input type="number" id="zone4-max" value="98" min="0" max="100" class="zone-input"></label>
                </div>
                <div style="flex: 1; min-width: 150px;">
                    <label>Zone 5: <input type="number" id="zone5-min" value="99" min="0" max="100" class="zone-input"> - <input type="number" id="zone5-max" value="100" min="0" max="100" class="zone-input"></label>
                </div>
            </div>
            <div id="bpm-labels" style="display: none; margin-top: 10px; font-size: 12px; color: #666;">
                Note: Values are in BPM. Update max HR to recalculate.
            </div>
        </div>

        <div class="form-group">
            <label>Select Fuel Type:</label>
            <div>
                <label><input type="checkbox" id="brand-gels" checked> Brand Gels (e.g., GU, Maurten)</label>
            </div>
            <div>
                <label><input type="checkbox" id="brand-drinks" checked> Brand Drinks (e.g., Gatorade, Tailwind)</label>
            </div>
            <div>
                <label><input type="checkbox" id="custom-fuel"> Custom Fuel</label>
            </div>
        </div>

        <div id="custom-fuel-section" class="form-group" style="display: none;">
            <label for="custom-name">Custom Fuel Name:</label>
            <input type="text" id="custom-name" placeholder="e.g., Homemade Energy Drink">
            <div class="inline-group">
                <div>
                    <label for="custom-carbs">Carbs per Serving (g):</label>
                    <input type="number" id="custom-carbs" min="0" value="25">
                </div>
                <div>
                    <label for="custom-fluids">Fluids per Serving (ml):</label>
                    <input type="number" id="custom-fluids" min="0" value="250">
                </div>
                <div>
                    <label for="custom-sodium">Sodium per Serving (mg):</label>
                    <input type="number" id="custom-sodium" min="0" value="100">
                </div>
            </div>
        </div>

        <button onclick="calculateFueling()">Calculate Fueling Needs</button>
        <div id="carb-warning" class="warning" style="display: none;"></div>

        <div id="results" class="results">
            <h2>Your Fueling Plan</h2>

            <div class="pre-post-section">
                <div class="pre-post-box">
                    <strong>Pre-Start (-1 hour)</strong><br>
                    <span id="pre-start-details"></span>
                </div>
                <div class="pre-post-box">
                    <strong>Post-Finish (+30 mins)</strong><br>
                    <span id="post-finish-details"></span>
                </div>
            </div>

            <h3>During Activity</h3>
            <div class="timeline-container">
                <div class="timeline-bar" id="timeline-bar"></div>
            </div>

            <h3>Detailed Plan</h3>
            <div class="no-print">
                <button onclick="window.print()">Print to PDF</button>
            </div>
            <table id="fueling-table">
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Suggestion</th>
                        <th>Carbs (g)</th>
                        <th>Fluids (ml)</th>
                        <th>Sodium (mg)</th>
                    </tr>
                </thead>
                <tbody id="fueling-table-body">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // Toggle custom fuel section
        document.getElementById('custom-fuel').addEventListener('change', function() {
            document.getElementById('custom-fuel-section').style.display = this.checked ? 'block' : 'none';
        });

        // Product database
        const productDatabase = [
            { name: "GU Energy Gel", carbs: 25, fluids: 0, sodium: 100, servingSize: "32g", type: "gel" },
            { name: "Maurten Gel 100", carbs: 25, fluids: 0, sodium: 50, servingSize: "40g", type: "gel" },
            { name: "Tailwind Nutrition Drink", carbs: 25, fluids: 250, sodium: 200, servingSize: "250ml", type: "drink" },
            { name: "Gatorade Endurance", carbs: 36, fluids: 500, sodium: 300, servingSize: "500ml", type: "drink" },
            { name: "Water", carbs: 0, fluids: 250, sodium: 0, servingSize: "250ml", type: "drink" }
        ];

        // Toggle between % and BPM for heart rate zones
        function toggleHeartRateMode() {
            const useBpm = document.getElementById('use-bpm').checked;
            const maxHeartRate = parseInt(document.getElementById('max-heart-rate').value) || 180;
            const zoneInputs = document.querySelectorAll('.zone-input');

            if (useBpm) {
                // Convert % to BPM
                document.getElementById('zone1-min').value = Math.round(0 / 100 * maxHeartRate);
                document.getElementById('zone1-max').value = Math.round(65 / 100 * maxHeartRate);
                document.getElementById('zone2-min').value = Math.round(66 / 100 * maxHeartRate);
                document.getElementById('zone2-max').value = Math.round(75 / 100 * maxHeartRate);
                document.getElementById('zone3-min').value = Math.round(76 / 100 * maxHeartRate);
                document.getElementById('zone3-max').value = Math.round(84 / 100 * maxHeartRate);
                document.getElementById('zone4-min').value = Math.round(85 / 100 * maxHeartRate);
                document.getElementById('zone4-max').value = Math.round(98 / 100 * maxHeartRate);
                document.getElementById('zone5-min').value = Math.round(99 / 100 * maxHeartRate);
                document.getElementById('zone5-max').value = Math.round(100 / 100 * maxHeartRate);

                // Update labels to show BPM
                zoneInputs.forEach(input => {
                    input.setAttribute('min', '40');
                    input.setAttribute('max', '220');
                });
                document.getElementById('bpm-labels').style.display = 'block';
            } else {
                // Convert BPM back to %
                document.getElementById('zone1-min').value = 0;
                document.getElementById('zone1-max').value = 65;
                document.getElementById('zone2-min').value = 66;
                document.getElementById('zone2-max').value = 75;
                document.getElementById('zone3-min').value = 76;
                document.getElementById('zone3-max').value = 84;
                document.getElementById('zone4-min').value = 85;
                document.getElementById('zone4-max').value = 98;
                document.getElementById('zone5-min').value = 99;
                document.getElementById('zone5-max').value = 100;

                // Update labels to show %
                zoneInputs.forEach(input => {
                    input.setAttribute('min', '0');
                    input.setAttribute('max', '100');
                });
                document.getElementById('bpm-labels').style.display = 'none';
            }
            updateHeartRateZone();
        }

        // Update heart rate and zone based on training type
        function updateHeartRateZone() {
            const trainingType = document.getElementById('training-type').value;
            const maxHeartRate = parseInt(document.getElementById('max-heart-rate').value) || 180;
            const useBpm = document.getElementById('use-bpm').checked;

            let zoneMin, zoneMax;
            switch (trainingType) {
                case "easy":
                    zoneMin = useBpm ? Math.round(66 / 100 * maxHeartRate) : 66;
                    zoneMax = useBpm ? Math.round(75 / 100 * maxHeartRate) : 75;
                    break;
                case "moderate":
                    zoneMin = useBpm ? Math.round(76 / 100 * maxHeartRate) : 76;
                    zoneMax = useBpm ? Math.round(84 / 100 * maxHeartRate) : 84;
                    break;
                case "hard":
                    zoneMin = useBpm ? Math.round(85 / 100 * maxHeartRate) : 85;
                    zoneMax = useBpm ? Math.round(98 / 100 * maxHeartRate) : 98;
                    break;
                case "race":
                    zoneMin = useBpm ? Math.round(76 / 100 * maxHeartRate) : 76;
                    zoneMax = useBpm ? Math.round(98 / 100 * maxHeartRate) : 98;
                    break;
                default:
                    zoneMin = useBpm ? Math.round(66 / 100 * maxHeartRate) : 66;
                    zoneMax = useBpm ? Math.round(75 / 100 * maxHeartRate) : 75;
            }

            // Set current heart rate to midpoint of the zone
            const midpoint = useBpm ? Math.round((zoneMin + zoneMax) / 2) : Math.round((zoneMin + zoneMax) / 2 / 100 * maxHeartRate);
            document.getElementById('intended-heart-rate').value = midpoint;
        }

        // Save user profile to localStorage
        function saveProfile() {
            const profile = {
                bodyWeight: document.getElementById('body-weight').value,
                maxHeartRate: document.getElementById('max-heart-rate').value,
                heavySweater: document.getElementById('heavy-sweater').checked
            };
            localStorage.setItem('fuelingProfile', JSON.stringify(profile));
            alert('Profile saved!');
        }

        // Load user profile from localStorage
        function loadProfile() {
            const savedProfile = localStorage.getItem('fuelingProfile');
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                document.getElementById('body-weight').value = profile.bodyWeight;
                document.getElementById('max-heart-rate').value = profile.maxHeartRate;
                document.getElementById('heavy-sweater').checked = profile.heavySweater;
                updateHeartRateZone();
                alert('Profile loaded!');
            } else {
                alert('No saved profile found.');
            }
        }

        // Calculate fueling needs
        function calculateFueling() {
            // Get inputs
            const trainingType = document.getElementById('training-type').value;
            const duration = parseFloat(document.getElementById('duration').value);
            const bodyWeight = parseFloat(document.getElementById('body-weight').value);
            const temperature = parseFloat(document.getElementById('temperature').value);
            const intendedHeartRate = parseInt(document.getElementById('intended-heart-rate').value);
            const maxHeartRate = parseInt(document.getElementById('max-heart-rate').value);
            const useBpm = document.getElementById('use-bpm').checked;
            const heavySweater = document.getElementById('heavy-sweater').checked;

            // Heart rate zones
            let zone1Min, zone1Max, zone2Min, zone2Max, zone3Min, zone3Max, zone4Min, zone4Max, zone5Min, zone5Max;
            if (useBpm) {
                zone1Min = parseInt(document.getElementById('zone1-min').value) || 0;
                zone1Max = parseInt(document.getElementById('zone1-max').value) || 65;
                zone2Min = parseInt(document.getElementById('zone2-min').value) || 66;
                zone2Max = parseInt(document.getElementById('zone2-max').value) || 75;
                zone3Min = parseInt(document.getElementById('zone3-min').value) || 76;
                zone3Max = parseInt(document.getElementById('zone3-max').value) || 84;
                zone4Min = parseInt(document.getElementById('zone4-min').value) || 85;
                zone4Max = parseInt(document.getElementById('zone4-max').value) || 98;
                zone5Min = parseInt(document.getElementById('zone5-min').value) || 99;
                zone5Max = parseInt(document.getElementById('zone5-max').value) || 100;
            } else {
                zone1Min = 0;
                zone1Max = 65;
                zone2Min = 66;
                zone2Max = 75;
                zone3Min = 76;
                zone3Max = 84;
                zone4Min = 85;
                zone4Max = 98;
                zone5Min = 99;
                zone5Max = 100;
            }

            // Determine heart rate zone
            let hrZone;
            if (useBpm) {
                if (intendedHeartRate <= zone1Max) hrZone = "Zone 1 (Easy)";
                else if (intendedHeartRate <= zone2Max) hrZone = "Zone 2 (Moderate)";
                else if (intendedHeartRate <= zone3Max) hrZone = "Zone 3 (Hard)";
                else if (intendedHeartRate <= zone4Max) hrZone = "Zone 4 (Very Hard)";
                else hrZone = "Zone 5 (Max Effort)";
            } else {
                const hrPercentage = (intendedHeartRate / maxHeartRate) * 100;
                if (hrPercentage <= zone1Max) hrZone = "Zone 1 (Easy)";
                else if (hrPercentage <= zone2Max) hrZone = "Zone 2 (Moderate)";
                else if (hrPercentage <= zone3Max) hrZone = "Zone 3 (Hard)";
                else if (hrPercentage <= zone4Max) hrZone = "Zone 4 (Very Hard)";
                else hrZone = "Zone 5 (Max Effort)";
            }

            // Carb requirements based on training type and zone
            let carbsPerHour;
            switch (trainingType) {
                case "easy":
                    carbsPerHour = hrZone.includes("Zone 2") ? 40 : 30;
                    break;
                case "moderate":
                    carbsPerHour = hrZone.includes("Zone 3") ? 50 : 40;
                    break;
                case "hard":
                    carbsPerHour = hrZone.includes("Zone 4") ? 70 : 60;
                    break;
                case "race":
                    carbsPerHour = hrZone.includes("Zone 4") ? 80 : hrZone.includes("Zone 3") ? 70 : 60;
                    break;
                default:
                    carbsPerHour = 50;
            }

            // Cap carb intake at 90g/hour
            if (carbsPerHour > 90) {
                document.getElementById('carb-warning').textContent = "Warning: Carb intake capped at 90g/hour (maximum absorbable).";
                document.getElementById('carb-warning').style.display = 'block';
                carbsPerHour = 90;
            } else {
                document.getElementById('carb-warning').style.display = 'none';
            }

            // Fluid and sodium adjustments
            const baseFluidPerHour = 500;
            const baseSodiumPerHour = 500;
            const tempFluidAdjustment = temperature > 25 ? 100 : 0;
            const tempSodiumAdjustment = temperature > 30 ? 200 : 0;
            const weightFluidAdjustment = bodyWeight * 5; // 5ml/kg/hour
            const heavySweaterAdjustment = heavySweater ? 200 : 0;

            let fluidPerHour = baseFluidPerHour + tempFluidAdjustment + weightFluidAdjustment;
            // Cap fluid at 1200ml/hour
            if (fluidPerHour > 1200) {
                fluidPerHour = 1200;
            }

            const sodiumPerHour = baseSodiumPerHour + tempSodiumAdjustment + heavySweaterAdjustment;

            // Pre-start recommendations
            const preStartCarbs = Math.round(bodyWeight * 1.5); // 1-2g/kg
            const preStartFluids = 500;
            const preStartSodium = 300;
            const preStartSuggestion = "Oatmeal + Banana";

            // Post-finish recommendations
            const postFinishCarbs = Math.round(bodyWeight * 1.1); // 1-1.2g/kg
            const postFinishFluids = Math.round(fluidPerHour * duration * 1.5); // 1.5x fluid lost
            const postFinishSodium = 600;
            const postFinishSuggestion = "Recovery Shake + Water";

            // Fuel selection
            const brandGels = document.getElementById('brand-gels').checked;
            const brandDrinks = document.getElementById('brand-drinks').checked;
            const customFuel = document.getElementById('custom-fuel').checked;

            let recommendedProducts = [];
            if (brandGels) recommendedProducts.push(...productDatabase.filter(p => p.type === "gel"));
            if (brandDrinks) recommendedProducts.push(...productDatabase.filter(p => p.type === "drink"));
            if (customFuel) {
                const customName = document.getElementById('custom-name').value || "Custom Fuel";
                const customCarbs = parseInt(document.getElementById('custom-carbs').value) || 25;
                const customFluids = parseInt(document.getElementById('custom-fluids').value) || 0;
                const customSodium = parseInt(document.getElementById('custom-sodium').value) || 0;
                recommendedProducts.push({ name: customName, carbs: customCarbs, fluids: customFluids, sodium: customSodium, servingSize: `${customFluids}ml`, type: "custom" });
            }

            // Fueling schedule during activity
            const schedule = [];
            const interval = duration <= 1 ? 30 : 45; // minutes
            const totalMinutes = duration * 60;

            // Add pre-start to schedule
            schedule.push({
                time: "-1:00",
                suggestion: preStartSuggestion,
                carbs: preStartCarbs,
                fluids: preStartFluids,
                sodium: preStartSodium,
                isPrePost: true
            });

            // Add during activity intakes
            for (let i = interval; i <= totalMinutes; i += interval) {
                const timeInHours = i / 60;
                const carbs = Math.round(carbsPerHour * (i / 60));
                const fluids = Math.round(fluidPerHour * (i / 60));
                const sodium = Math.round(sodiumPerHour * (i / 60));

                // Select a product based on type preference
                let product;
                if (recommendedProducts.length > 0) {
                    // Alternate between gels and drinks if both are selected
                    const lastProductType = schedule.length > 0 ? schedule[schedule.length - 1].suggestion.type : null;
                    const availableProducts = recommendedProducts.filter(p => !lastProductType || p.type !== lastProductType);
                    product = availableProducts.length > 0 ? availableProducts[0] : recommendedProducts[0];
                } else {
                    product = { name: "Water", carbs: 0, fluids: 250, sodium: 0, type: "drink" };
                }

                schedule.push({
                    time: formatTime(i),
                    suggestion: product.name,
                    carbs: product.carbs,
                    fluids: product.fluids,
                    sodium: product.sodium,
                    isPrePost: false,
                    type: product.type
                });
            }

            // Add post-finish to schedule
            schedule.push({
                time: `Finish + 0:30`,
                suggestion: postFinishSuggestion,
                carbs: postFinishCarbs,
                fluids: postFinishFluids,
                sodium: postFinishSodium,
                isPrePost: true
            });

            // Calculate totals
            const totalCarbs = schedule.reduce((sum, item) => sum + item.carbs, 0);
            const totalFluids = schedule.reduce((sum, item) => sum + item.fluids, 0);
            const totalSodium = schedule.reduce((sum, item) => sum + item.sodium, 0);

            // Display pre-start and post-finish
            document.getElementById('pre-start-details').innerHTML =
                `${preStartSuggestion}<br>Carbs: ${preStartCarbs}g, Fluids: ${preStartFluids}ml, Sodium: ${preStartSodium}mg`;
            document.getElementById('post-finish-details').innerHTML =
                `${postFinishSuggestion}<br>Carbs: ${postFinishCarbs}g, Fluids: ${postFinishFluids}ml, Sodium: ${postFinishSodium}mg`;

            // Create timeline
            createTimeline(schedule.filter(item => !item.isPrePost), duration);

            // Create table
            createTable(schedule, totalCarbs, totalFluids, totalSodium);

            // Show results
            document.getElementById('results').style.display = 'block';
        }

        // Format time from minutes to HH:MM
        function formatTime(minutes) {
            const hrs = Math.floor(minutes / 60);
            const mins = minutes % 60;
            return `${hrs}:${mins.toString().padStart(2, '0')}`;
        }

        // Create visual timeline
        function createTimeline(schedule, duration) {
            const timelineBar = document.getElementById('timeline-bar');
            timelineBar.innerHTML = '';

            const totalMinutes = duration * 60;
            const barWidth = timelineBar.offsetWidth;

            // Add segments (e.g., every 30 or 45 minutes)
            const segmentInterval = duration <= 1 ? 30 : 45;
            for (let i = segmentInterval; i <= totalMinutes; i += segmentInterval) {
                const segment = document.createElement('div');
                segment.className = 'timeline-segment';
                segment.style.left = `${(i / totalMinutes) * 100}%`;
                timelineBar.appendChild(segment);

                const label = document.createElement('div');
                label.className = 'timeline-label';
                label.textContent = formatTime(i);
                label.style.left = `${(i / totalMinutes) * 100}%`;
                timelineBar.parentNode.appendChild(label);
            }

            // Add intake icons
            schedule.forEach(item => {
                const [hrs, mins] = item.time.split(':').map(Number);
                const totalItemMinutes = hrs * 60 + mins;
                const positionPercentage = (totalItemMinutes / totalMinutes) * 100;

                const icon = document.createElement('div');
                icon.className = 'intake-icon';
                icon.style.left = `${positionPercentage}%`;

                // Choose icon based on suggestion
                let iconHtml;
                if (item.type === "gel" || item.suggestion.includes("Gel")) {
                    iconHtml = '<i class="fas fa-capsules"></i>';
                } else if (item.type === "drink" || item.suggestion.includes("Drink") || item.suggestion.includes("Water")) {
                    iconHtml = '<i class="fas fa-tint"></i>';
                } else {
                    iconHtml = '<i class="fas fa-utensils"></i>';
                }

                const tooltip = `${item.time}: ${item.suggestion}\nCarbs: ${item.carbs}g, Fluids: ${item.fluids}ml, Sodium: ${item.sodium}mg`;
                icon.innerHTML = iconHtml;
                icon.setAttribute('data-tooltip', tooltip);

                timelineBar.parentNode.appendChild(icon);
            });
        }

        // Create detailed table
        function createTable(schedule, totalCarbs, totalFluids, totalSodium) {
            const tableBody = document.getElementById('fueling-table-body');
            tableBody.innerHTML = '';

            schedule.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.time}</td>
                    <td>${item.suggestion}</td>
                    <td>${item.carbs}</td>
                    <td>${item.fluids}</td>
                    <td>${item.sodium}</td>
                `;
                tableBody.appendChild(row);
            });

            // Add total row
            const totalRow = document.createElement('tr');
            totalRow.className = 'total-row';
            totalRow.innerHTML = `
                <td><strong>Total</strong></td>
                <td></td>
                <td><strong>${totalCarbs}</strong></td>
                <td><strong>${totalFluids}</strong></td>
                <td><strong>${totalSodium}</strong></td>
            `;
            tableBody.appendChild(totalRow);
        }

        // Initialize heart rate zone on page load
        window.onload = function() {
            updateHeartRateZone();
            // Load profile if exists
            const savedProfile = localStorage.getItem('fuelingProfile');
            if (savedProfile) {
                const profile = JSON.parse(savedProfile);
                document.getElementById('body-weight').value = profile.bodyWeight;
                document.getElementById('max-heart-rate').value = profile.maxHeartRate;
                document.getElementById('heavy-sweater').checked = profile.heavySweater;
            }
        };
    </script>
</body>
</html>
